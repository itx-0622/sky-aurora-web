<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Aurora Official - V16.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #001f3f 0%, #000 50%, #001f1f 100%);
            z-index: -1;
        }
        /* 이스터에그 숨기기 스타일 */
        .easter-egg {
            position: fixed; bottom: 20px; right: 20px;
            width: 50px; opacity: 0.1; transition: 0.5s; cursor: pointer;
        }
        .easter-egg:hover { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>
    <div class="aurora"></div>
    
    <div class="flex flex-col items-center justify-center min-h-screen px-4">
        <img src="logo.png" alt="Sky Aurora Logo" class="w-32 md:w-48 mb-8 animate-pulse">
        
        <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tighter text-blue-400">SKY AURORA</h1>
        <p class="text-xl text-gray-400 font-light">Ground Crew System V16.5</p>
        
        <div class="mt-10 p-8 bg-white/5 rounded-3xl border border-white/10 backdrop-blur-2xl shadow-2xl">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
                <p class="font-mono text-green-400 text-lg uppercase tracking-widest">System Online</p>
            </div>
            <p class="text-gray-500 mt-2 text-sm text-center">Ready for Departure</p>
        </div>

        <img src="easter-egg.png" alt="Hidden Surprise" class="easter-egg" onclick="alert('오로라 엔진 이스터에그 발견! 🍬')">
    </div>
</body>
</html>
